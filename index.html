<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Summaries</title>
  <style>
    :root {
      --bg: #efefef;
      --panel: #f5f5f5;
      --card: #ffffff;
      --muted: #b8b8b8;
      --muted-2: #d9d9d9;
      --text: #252525;
      --text-soft: #6a6a6a;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eeeeee 0%, #e8e8e8 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 22px 40px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      text-align: center;
      padding-top: 8px;
    }

    .hero h1 {
      margin: 0;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #7a7a7a;
      font-size: clamp(2.2rem, 7vw, 4rem);
    }

    .hero p {
      margin: 8px 0 0;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      color: #7d7d7d;
    }

    .top-actions {
      margin: 28px 0 12px;
      display: grid;
      gap: 12px;
    }

    .main-button,
    .back-button,
    .small-button,
    .icon-button {
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      font: inherit;
    }

    .main-button:hover,
    .back-button:hover,
    .small-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
    }

    .main-button {
      width: 100%;
      background: #b0b0b0;
      color: #f7f7f7;
      height: 64px;
      border-radius: 18px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: var(--shadow);
    }

    .back-button {
      background: #b0b0b0;
      color: #f7f7f7;
      border-radius: 16px;
      padding: 14px 28px;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: var(--shadow);
    }

    .small-button {
      background: #b0b0b0;
      color: #f8f8f8;
      border-radius: 18px;
      padding: 16px 20px;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: var(--shadow);
    }

    .icon-button {
      background: transparent;
      color: var(--text-soft);
      font-size: 1rem;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .search-wrap {
      position: relative;
    }

    .search-input,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: none;
      border-radius: 18px;
      background: rgba(255,255,255,0.9);
      box-shadow: var(--shadow);
      color: var(--text);
      font: inherit;
    }

    .search-input {
      height: 56px;
      padding: 0 18px;
    }

    .field input,
    .field select {
      height: 52px;
      padding: 0 16px;
    }

    .field textarea {
      min-height: 130px;
      padding: 16px;
      resize: vertical;
      line-height: 1.6;
    }

    .dropdown {
      position: absolute;
      left: 0;
      right: 0;
      top: 64px;
      background: rgba(255,255,255,0.98);
      border-radius: 22px;
      box-shadow: 0 22px 40px rgba(0,0,0,0.12);
      padding: 10px;
      z-index: 30;
      display: none;
      max-height: 360px;
      overflow: auto;
    }

    .dropdown.active {
      display: block;
    }

    .dropdown-item {
      padding: 14px 16px;
      border-radius: 16px;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: #f1f1f1;
    }

    .dropdown-item strong {
      display: block;
      font-size: 0.98rem;
      margin-bottom: 4px;
    }

    .dropdown-item span {
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .section-title {
      margin: 22px 0 18px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.03em;
    }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    .book-tile {
      cursor: pointer;
      transition: transform 0.18s ease;
    }

    .book-tile:hover {
      transform: translateY(-3px);
    }

    .cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 0;
      object-fit: cover;
      background: linear-gradient(180deg, #cfe6f5 0%, #dceaf1 62%, #9db34d 63%, #8aa000 100%);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .book-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 36px;
      align-items: start;
    }

    .book-cover-large {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: linear-gradient(180deg, #cfe6f5 0%, #dceaf1 62%, #9db34d 63%, #8aa000 100%);
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }

    .detail-heading {
      margin: 18px 0 12px;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .details-card {
      background: rgba(255,255,255,0.55);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    .notes-heading {
      margin: 26px 0 16px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.03em;
    }

    .summary-list {
      display: grid;
      gap: 18px;
    }

    .summary-card,
    .summary-add {
      border: none;
      width: 100%;
      text-align: left;
      border-radius: 20px;
      padding: 24px 28px;
      background: #dcdcdc;
      color: #222;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .summary-add {
      background: #b0b0b0;
      color: #f7f7f7;
      font-weight: 700;
    }

    .summary-editor-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .editor-box {
      background: rgba(255,255,255,0.65);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .editor-title {
      margin: 14px 0 14px;
    }

    .editor-title input {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .editor-content textarea {
      min-height: 62vh;
      font-size: 1rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 60;
    }

    .modal.active {
      display: flex;
    }

    .modal-panel {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #f2f2f2;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 28px 60px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .row-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-note {
      color: var(--text-soft);
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 760px) {
      .library-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .book-layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .modal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="libraryScreen" class="screen active">
      <div class="hero">
        <h1>BOOK SUMMARIES</h1>
        <p>Never remember anything you read?</p>
      </div>

      <div class="top-actions">
        <div class="search-wrap">
          <input id="frontSearch" class="search-input" placeholder="Search a book to add instantly" autocomplete="off" />
          <div id="frontDropdown" class="dropdown"></div>
        </div>
        <button id="openModalBtn" class="main-button">+ NEW BOOK</button>
      </div>

      <h2 class="section-title">LIBRARY:</h2>
      <div id="libraryGrid" class="library-grid"></div>
    </section>

    <section id="bookScreen" class="screen">
      <button class="back-button" onclick="goLibrary()">BACK</button>

      <div class="book-layout" style="margin-top:26px;">
        <div>
          <img id="bookCoverLarge" class="book-cover-large" alt="Book cover" />
        </div>

        <div>
          <div class="detail-heading">Book details:</div>
          <div class="details-card">
            <div class="field-grid">
              <div class="field"><label>Title</label><input id="detailTitle" /></div>
              <div class="field"><label>Author</label><input id="detailAuthor" /></div>
              <div class="field"><label>Genre</label><input id="detailGenre" /></div>
              <div class="field"><label>Year</label><input id="detailYear" /></div>
              <div class="field"><label>Pages</label><input id="detailPages" /></div>
              <div class="field"><label>ISBN</label><input id="detailIsbn" /></div>
              <div class="field"><label>Status</label>
                <select id="detailStatus">
                  <option>To Read</option>
                  <option>Reading</option>
                  <option>Finished</option>
                  <option>Paused</option>
                </select>
              </div>
              <div class="field"><label>Rating</label><input id="detailRating" placeholder="e.g. 4.5/5" /></div>
              <div class="field full"><label>Cover image URL</label><input id="detailCover" /></div>
              <div class="field full"><label>Description / notes</label><textarea id="detailDescription"></textarea></div>
            </div>
            <div class="row-actions" style="margin-top:14px;">
              <button class="small-button" onclick="saveBookDetails()">SAVE DETAILS</button>
              <button class="icon-button" onclick="deleteCurrentBook()">Delete book</button>
            </div>
          </div>
        </div>
      </div>

      <h2 class="notes-heading">NOTES:</h2>
      <div class="summary-list">
        <button class="summary-add" onclick="addSummary()">+ NEW SUMMARY</button>
        <div id="summaryList"></div>
      </div>
    </section>

    <section id="summaryScreen" class="screen">
      <button class="back-button" onclick="goBook()">BACK</button>
      <div class="editor-box" style="margin-top:24px;">
        <div class="editor-title field">
          <label>Section title</label>
          <input id="summaryTitleInput" />
        </div>
        <div class="editor-content field">
          <label>Notes</label>
          <textarea id="summaryContentInput"></textarea>
        </div>
        <div class="row-actions" style="margin-top:16px;">
          <button class="small-button" onclick="saveSummary()">SAVE</button>
          <button class="icon-button" onclick="deleteCurrentSummary()">Delete summary</button>
        </div>
      </div>
    </section>
  </div>

  <div id="newBookModal" class="modal">
    <div class="modal-panel">
      <div class="modal-header">
        <h3>New Book</h3>
        <button class="icon-button" onclick="closeModal()">✕</button>
      </div>

      <div class="search-wrap" style="margin-bottom:16px;">
        <input id="modalSearch" class="search-input" placeholder="Search a book title or author to prefill details" autocomplete="off" />
        <div id="modalDropdown" class="dropdown"></div>
      </div>

      <div class="modal-grid">
        <div class="field"><label>Title</label><input id="formTitle" /></div>
        <div class="field"><label>Author</label><input id="formAuthor" /></div>
        <div class="field"><label>Genre</label><input id="formGenre" /></div>
        <div class="field"><label>Year</label><input id="formYear" /></div>
        <div class="field"><label>Pages</label><input id="formPages" /></div>
        <div class="field"><label>ISBN</label><input id="formIsbn" /></div>
        <div class="field"><label>Status</label>
          <select id="formStatus">
            <option>To Read</option>
            <option>Reading</option>
            <option>Finished</option>
            <option>Paused</option>
          </select>
        </div>
        <div class="field"><label>Rating</label><input id="formRating" /></div>
        <div class="field full"><label>Cover image URL</label><input id="formCover" /></div>
        <div class="field full"><label>Description / notes</label><textarea id="formDescription"></textarea></div>
      </div>

      <div class="row-actions" style="margin-top:18px;">
        <button class="small-button" onclick="saveModalBook()">ADD BOOK</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'book-summaries-clean-v1';

    const starterBooks = [
      {
        id: crypto.randomUUID(),
        title: 'The Subtle Art of Not Giving a F*ck',
        author: 'Mark Manson',
        genre: 'Self-help',
        year: '2016',
        pages: '224',
        isbn: '9780062457714',
        status: 'Finished',
        rating: '',
        cover: 'https://covers.openlibrary.org/b/isbn/9780062457714-L.jpg',
        description: '',
        summaries: [
          { id: crypto.randomUUID(), title: 'CHAPTER 1', content: '' },
          { id: crypto.randomUUID(), title: 'CHAPTER 2', content: '' },
          { id: crypto.randomUUID(), title: 'CHAPTER 3', content: '' },
          { id: crypto.randomUUID(), title: 'CHAPTER 4', content: '' }
        ]
      }
    ];

    let books = loadBooks();
    let currentBookId = null;
    let currentSummaryId = null;
    let frontResults = [];
    let modalResults = [];
    let frontTimer = null;
    let modalTimer = null;

    function loadBooks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return starterBooks;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) && parsed.length ? parsed : starterBooks;
      } catch {
        return starterBooks;
      }
    }

    function saveBooks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function fallbackCover() {
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
          <defs>
            <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
              <stop stop-color="#cfe6f5" offset="0%"/>
              <stop stop-color="#dceaf1" offset="62%"/>
              <stop stop-color="#9db34d" offset="63%"/>
              <stop stop-color="#8aa000" offset="100%"/>
            </linearGradient>
          </defs>
          <rect width="300" height="400" fill="url(#g)"/>
          <ellipse cx="85" cy="115" rx="40" ry="22" fill="#f5f5f5"/>
          <ellipse cx="120" cy="115" rx="48" ry="26" fill="#f5f5f5"/>
          <ellipse cx="160" cy="117" rx="38" ry="20" fill="#f5f5f5"/>
        </svg>`);
    }

    function renderLibrary() {
      const grid = document.getElementById('libraryGrid');
      if (!books.length) {
        grid.innerHTML = '<div class="empty-note">No books yet. Add one with the button above.</div>';
        return;
      }

      grid.innerHTML = books.map(book => `
        <div class="book-tile" onclick="openBook('${book.id}')">
          <img class="cover" src="${escapeAttribute(book.cover || fallbackCover())}" alt="${escapeAttribute(book.title)}" onerror="this.src='${escapeAttribute(fallbackCover())}'" />
        </div>
      `).join('');
    }

    function openBook(id) {
      currentBookId = id;
      currentSummaryId = null;
      const book = books.find(b => b.id === id);
      if (!book) return;

      document.getElementById('bookCoverLarge').src = book.cover || fallbackCover();
      document.getElementById('bookCoverLarge').onerror = function () { this.src = fallbackCover(); };
      document.getElementById('detailTitle').value = book.title || '';
      document.getElementById('detailAuthor').value = book.author || '';
      document.getElementById('detailGenre').value = book.genre || '';
      document.getElementById('detailYear').value = book.year || '';
      document.getElementById('detailPages').value = book.pages || '';
      document.getElementById('detailIsbn').value = book.isbn || '';
      document.getElementById('detailStatus').value = book.status || 'To Read';
      document.getElementById('detailRating').value = book.rating || '';
      document.getElementById('detailCover').value = book.cover || '';
      document.getElementById('detailDescription').value = book.description || '';

      renderSummaryList();
      showScreen('bookScreen');
    }

    function renderSummaryList() {
      const book = books.find(b => b.id === currentBookId);
      const target = document.getElementById('summaryList');
      if (!book || !book.summaries.length) {
        target.innerHTML = '<div class="empty-note">No summaries yet.</div>';
        return;
      }

      target.innerHTML = book.summaries.map(summary => `
        <button class="summary-card" onclick="openSummary('${summary.id}')">${escapeHtml(summary.title || 'UNTITLED')}</button>
      `).join('');
    }

    function saveBookDetails() {
      books = books.map(book => {
        if (book.id !== currentBookId) return book;
        return {
          ...book,
          title: document.getElementById('detailTitle').value.trim(),
          author: document.getElementById('detailAuthor').value.trim(),
          genre: document.getElementById('detailGenre').value.trim(),
          year: document.getElementById('detailYear').value.trim(),
          pages: document.getElementById('detailPages').value.trim(),
          isbn: document.getElementById('detailIsbn').value.trim(),
          status: document.getElementById('detailStatus').value,
          rating: document.getElementById('detailRating').value.trim(),
          cover: document.getElementById('detailCover').value.trim(),
          description: document.getElementById('detailDescription').value.trim()
        };
      });
      saveBooks();
      renderLibrary();
      openBook(currentBookId);
    }

    function deleteCurrentBook() {
      if (!confirm('Delete this book?')) return;
      books = books.filter(book => book.id !== currentBookId);
      saveBooks();
      currentBookId = null;
      currentSummaryId = null;
      renderLibrary();
      showScreen('libraryScreen');
    }

    function addSummary() {
      const book = books.find(b => b.id === currentBookId);
      if (!book) return;
      const number = book.summaries.length + 1;
      book.summaries.unshift({ id: crypto.randomUUID(), title: `CHAPTER ${number}`, content: '' });
      saveBooks();
      renderSummaryList();
    }

    function openSummary(id) {
      currentSummaryId = id;
      const book = books.find(b => b.id === currentBookId);
      if (!book) return;
      const summary = book.summaries.find(s => s.id === id);
      if (!summary) return;
      document.getElementById('summaryTitleInput').value = summary.title || '';
      document.getElementById('summaryContentInput').value = summary.content || '';
      showScreen('summaryScreen');
    }

    function saveSummary() {
      const book = books.find(b => b.id === currentBookId);
      if (!book) return;
      const summary = book.summaries.find(s => s.id === currentSummaryId);
      if (!summary) return;
      summary.title = document.getElementById('summaryTitleInput').value.trim() || 'UNTITLED';
      summary.content = document.getElementById('summaryContentInput').value;
      saveBooks();
      renderSummaryList();
      showScreen('bookScreen');
    }

    function deleteCurrentSummary() {
      const book = books.find(b => b.id === currentBookId);
      if (!book) return;
      if (!confirm('Delete this summary?')) return;
      book.summaries = book.summaries.filter(s => s.id !== currentSummaryId);
      saveBooks();
      currentSummaryId = null;
      renderSummaryList();
      showScreen('bookScreen');
    }

    function goLibrary() {
      renderLibrary();
      showScreen('libraryScreen');
    }

    function goBook() {
      showScreen('bookScreen');
    }

    function openModal() {
      document.getElementById('newBookModal').classList.add('active');
      clearModalForm();
    }

    function closeModal() {
      document.getElementById('newBookModal').classList.remove('active');
      document.getElementById('modalDropdown').classList.remove('active');
    }

    function clearModalForm() {
      document.getElementById('modalSearch').value = '';
      document.getElementById('formTitle').value = '';
      document.getElementById('formAuthor').value = '';
      document.getElementById('formGenre').value = '';
      document.getElementById('formYear').value = '';
      document.getElementById('formPages').value = '';
      document.getElementById('formIsbn').value = '';
      document.getElementById('formStatus').value = 'To Read';
      document.getElementById('formRating').value = '';
      document.getElementById('formCover').value = '';
      document.getElementById('formDescription').value = '';
      document.getElementById('modalDropdown').innerHTML = '';
      modalResults = [];
    }

    function getModalBook() {
      return {
        title: document.getElementById('formTitle').value.trim(),
        author: document.getElementById('formAuthor').value.trim(),
        genre: document.getElementById('formGenre').value.trim(),
        year: document.getElementById('formYear').value.trim(),
        pages: document.getElementById('formPages').value.trim(),
        isbn: document.getElementById('formIsbn').value.trim(),
        status: document.getElementById('formStatus').value,
        rating: document.getElementById('formRating').value.trim(),
        cover: document.getElementById('formCover').value.trim(),
        description: document.getElementById('formDescription').value.trim(),
        summaries: [{ id: crypto.randomUUID(), title: 'CHAPTER 1', content: '' }]
      };
    }

    function saveModalBook() {
      const book = getModalBook();
      if (!book.title) {
        alert('Please enter a title.');
        return;
      }
      book.id = crypto.randomUUID();
      books.unshift(book);
      saveBooks();
      closeModal();
      renderLibrary();
      openBook(book.id);
    }

    async function searchBooks(query) {
      const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=8`);
      const data = await res.json();
      return (data.docs || []).slice(0, 8).map(item => ({
        title: item.title || '',
        author: item.author_name?.[0] || '',
        genre: item.subject?.[0] || '',
        year: item.first_publish_year ? String(item.first_publish_year) : '',
        pages: item.number_of_pages_median ? String(item.number_of_pages_median) : '',
        isbn: item.isbn?.[0] || '',
        status: 'To Read',
        rating: '',
        cover: item.cover_i ? `https://covers.openlibrary.org/b/id/${item.cover_i}-L.jpg` : '',
        description: item.subject ? `Topics: ${item.subject.slice(0, 5).join(', ')}` : '',
        summaries: [{ id: crypto.randomUUID(), title: 'CHAPTER 1', content: '' }]
      }));
    }

    function renderDropdown(targetId, results, selectFnName) {
      const dropdown = document.getElementById(targetId);
      if (!results.length) {
        dropdown.innerHTML = '<div class="dropdown-item"><span>No books found.</span></div>';
        dropdown.classList.add('active');
        return;
      }
      dropdown.innerHTML = results.map((item, index) => `
        <div class="dropdown-item" onclick="${selectFnName}(${index})">
          <strong>${escapeHtml(item.title)}</strong>
          <span>${escapeHtml(item.author || 'Unknown author')}${item.year ? ' • ' + escapeHtml(item.year) : ''}${item.pages ? ' • ' + escapeHtml(item.pages) + ' pages' : ''}</span>
        </div>
      `).join('');
      dropdown.classList.add('active');
    }

    async function handleFrontSearch() {
      const query = document.getElementById('frontSearch').value.trim();
      const dropdown = document.getElementById('frontDropdown');
      if (query.length < 2) {
        dropdown.classList.remove('active');
        return;
      }
      dropdown.innerHTML = '<div class="dropdown-item"><span>Searching...</span></div>';
      dropdown.classList.add('active');
      try {
        frontResults = await searchBooks(query);
        renderDropdown('frontDropdown', frontResults, 'selectFrontBook');
      } catch {
        dropdown.innerHTML = '<div class="dropdown-item"><span>Could not load results.</span></div>';
      }
    }

    async function handleModalSearch() {
      const query = document.getElementById('modalSearch').value.trim();
      const dropdown = document.getElementById('modalDropdown');
      if (query.length < 2) {
        dropdown.classList.remove('active');
        return;
      }
      dropdown.innerHTML = '<div class="dropdown-item"><span>Searching...</span></div>';
      dropdown.classList.add('active');
      try {
        modalResults = await searchBooks(query);
        renderDropdown('modalDropdown', modalResults, 'selectModalBook');
      } catch {
        dropdown.innerHTML = '<div class="dropdown-item"><span>Could not load results.</span></div>';
      }
    }

    function selectFrontBook(index) {
      const selected = frontResults[index];
      if (!selected) return;
      const book = { ...selected, id: crypto.randomUUID() };
      books.unshift(book);
      saveBooks();
      document.getElementById('frontSearch').value = '';
      document.getElementById('frontDropdown').classList.remove('active');
      renderLibrary();
      openBook(book.id);
    }

    function selectModalBook(index) {
      const selected = modalResults[index];
      if (!selected) return;
      document.getElementById('formTitle').value = selected.title || '';
      document.getElementById('formAuthor').value = selected.author || '';
      document.getElementById('formGenre').value = selected.genre || '';
      document.getElementById('formYear').value = selected.year || '';
      document.getElementById('formPages').value = selected.pages || '';
      document.getElementById('formIsbn').value = selected.isbn || '';
      document.getElementById('formStatus').value = selected.status || 'To Read';
      document.getElementById('formRating').value = selected.rating || '';
      document.getElementById('formCover').value = selected.cover || '';
      document.getElementById('formDescription').value = selected.description || '';
      document.getElementById('modalDropdown').classList.remove('active');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    document.getElementById('openModalBtn').addEventListener('click', openModal);

    document.getElementById('frontSearch').addEventListener('input', () => {
      clearTimeout(frontTimer);
      frontTimer = setTimeout(handleFrontSearch, 250);
    });

    document.getElementById('modalSearch').addEventListener('input', () => {
      clearTimeout(modalTimer);
      modalTimer = setTimeout(handleModalSearch, 250);
    });

    document.getElementById('newBookModal').addEventListener('click', (e) => {
      if (e.target.id === 'newBookModal') closeModal();
    });

    document.addEventListener('click', (e) => {
      const frontSearch = document.getElementById('frontSearch');
      const frontDropdown = document.getElementById('frontDropdown');
      const modalSearch = document.getElementById('modalSearch');
      const modalDropdown = document.getElementById('modalDropdown');

      if (!frontSearch.contains(e.target) && !frontDropdown.contains(e.target)) {
        frontDropdown.classList.remove('active');
      }
      if (!modalSearch.contains(e.target) && !modalDropdown.contains(e.target)) {
        modalDropdown.classList.remove('active');
      }
    });

    window.openBook = openBook;
    window.goLibrary = goLibrary;
    window.goBook = goBook;
    window.addSummary = addSummary;
    window.openSummary = openSummary;
    window.saveSummary = saveSummary;
    window.deleteCurrentSummary = deleteCurrentSummary;
    window.saveBookDetails = saveBookDetails;
    window.deleteCurrentBook = deleteCurrentBook;
    window.closeModal = closeModal;
    window.saveModalBook = saveModalBook;
    window.selectFrontBook = selectFrontBook;
    window.selectModalBook = selectModalBook;

    renderLibrary();
  </script>
</body>
</html>
